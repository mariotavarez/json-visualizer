  <text x="400" y="22" font-family="-apple-system,sans-serif" font-size="11" fill="#4b5280" text-anchor="middle">localhost:5173 — JSONLens</text>

  <!-- App background -->
  <rect y="36" width="800" height="444" fill="#0a0a0f"/>

  <!-- Top toolbar -->
  <rect y="36" width="800" height="44" fill="#0f0f1a"/>
  <rect y="79" width="800" height="1" fill="#1e1e2e"/>
  <rect x="20" y="48" width="24" height="24" rx="6" fill="url(#accentGrad)"/>
  <text x="32" y="64" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">{}</text>
  <text x="54" y="63" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">JSONLens</text>
  <rect x="512" y="48" width="152" height="24" rx="6" fill="#1a1a26"/>
  <rect x="512" y="48" width="152" height="24" rx="6" fill="none" stroke="#2a2a38" stroke-width="1"/>
  <text x="528" y="64" font-family="'SF Mono',monospace" font-size="11" fill="#4b5280">Search keys or values</text>
  <rect x="676" y="48" width="52" height="24" rx="12" fill="#1e1e30"/>
  <text x="702" y="64" font-family="-apple-system,sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">Tree</text>
  <rect x="736" y="48" width="44" height="24" rx="12" fill="#1a1a26"/>
  <text x="758" y="64" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280" text-anchor="middle">Raw</text>

  <!-- Stats bar -->
  <rect y="80" width="800" height="24" fill="#09090f"/>
  <text x="20" y="96" font-family="'SF Mono',monospace" font-size="10" fill="#3d3d5c">120 keys · depth 4 · 3 arrays · 2.4 KB</text>
  <text x="680" y="96" font-family="-apple-system,sans-serif" font-size="10" fill="#2a2a3c">Expand all · Collapse all</text>

  <!-- Left panel (input) -->
  <rect x="0" y="104" width="264" height="376" fill="#0b0b14"/>
  <rect x="264" y="104" width="1" height="376" fill="#1a1a26"/>
  <text x="16" y="124" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#3d3d5c" letter-spacing="1">INPUT</text>

  <!-- JSON input text -->
  <text x="16" y="144" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">{</text>
  <text x="28" y="160" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"id"</text><text x="64" y="160" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">:</text><text x="72" y="160" font-family="'SF Mono',monospace" font-size="11.5" fill="#38bdf8">1</text><text x="80" y="160" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">,</text>
  <text x="28" y="176" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"name"</text><text x="96" y="176" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"Alice Johnson"</text>
  <text x="28" y="192" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"active"</text><text x="104" y="192" font-family="'SF Mono',monospace" font-size="11.5" fill="#fb923c">true</text>
  <text x="28" y="208" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"score"</text><text x="96" y="208" font-family="'SF Mono',monospace" font-size="11.5" fill="#38bdf8">98.5</text>
  <text x="28" y="224" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"tags"</text><text x="80" y="224" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">: [...]</text>
  <text x="28" y="240" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"address"</text><text x="100" y="240" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">: {</text>
  <text x="44" y="256" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"city"</text><text x="92" y="256" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"San Francisco"</text>
  <text x="44" y="272" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"zip"</text><text x="84" y="272" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"94105"</text>
  <text x="28" y="288" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">},</text>
  <text x="28" y="304" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">"metadata"</text><text x="116" y="304" font-family="'SF Mono',monospace" font-size="11.5" fill="#f87171">null</text>
  <text x="16" y="320" font-family="'SF Mono',monospace" font-size="11.5" fill="#4b5280">}</text>

  <!-- Right panel (tree) -->
  <rect x="265" y="104" width="535" height="376" fill="#0d0d14"/>

  <!-- Tree root row -->
  <rect x="280" y="112" width="506" height="28" rx="6" fill="#141420"/>
  <text x="296" y="130" font-family="-apple-system,sans-serif" font-size="11" fill="#4b5280">▼</text>
  <text x="314" y="130" font-family="'SF Mono',monospace" font-size="12" fill="#94a3b8">{ } Object</text>
  <rect x="700" y="116" width="36" height="18" rx="9" fill="#1e1e30"/>
  <text x="718" y="128" font-family="-apple-system,sans-serif" font-size="9" fill="#4b5280" text-anchor="middle">8 keys</text>

  <!-- id row -->
  <text x="308" y="161" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">id</text>
  <text x="330" y="161" font-family="'SF Mono',monospace" font-size="11.5" fill="#374151">:</text>
  <text x="342" y="161" font-family="'SF Mono',monospace" font-size="11.5" fill="#38bdf8">1</text>

  <!-- name row (hovered - copy path tooltip) -->
  <rect x="296" y="170" width="490" height="22" rx="4" fill="#1a1a28"/>
  <text x="308" y="185" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">name</text>
  <text x="358" y="185" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"Alice Johnson"</text>
  <!-- Copy tooltip animates in/out -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.25;0.32;0.55;0.62;0.68;1" dur="10s" repeatCount="indefinite"/>
    <rect x="506" y="172" width="100" height="18" rx="5" fill="#1e1e35"/>
    <rect x="506" y="172" width="100" height="18" rx="5" fill="none" stroke="#2d2d50" stroke-width="1"/>
    <text x="512" y="184" font-family="'SF Mono',monospace" font-size="9" fill="#6366f1">user.name  ⎘</text>
  </g>

  <!-- active, score static -->
  <text x="308" y="209" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">active</text>
  <text x="366" y="209" font-family="'SF Mono',monospace" font-size="11.5" fill="#fb923c">true</text>
  <text x="308" y="229" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">score</text>
  <text x="362" y="229" font-family="'SF Mono',monospace" font-size="11.5" fill="#38bdf8">98.5</text>

  <!-- tags - collapsed initially, then expands -->
  <text x="308" y="251" font-family="-apple-system,sans-serif" font-size="11" fill="#374151">
    <animate attributeName="font-size" values="11;11;11;11;11;11" dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="308" y="251" font-family="-apple-system,sans-serif" font-size="11">
    <animate attributeName="fill" values="#374151;#374151;#6366f1;#374151;#374151;#374151" keyTimes="0;0.40;0.46;0.52;0.80;1" dur="10s" repeatCount="indefinite"/>
    ▶
  </text>
  <text x="324" y="251" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">tags</text>
  <text x="354" y="251" font-family="'SF Mono',monospace" font-size="11.5" fill="#374151">:</text>

  <!-- Tags collapsed state -->
  <g>
    <animate attributeName="opacity" values="1;1;1;1;0;0;1;1" keyTimes="0;0.40;0.46;0.50;0.54;0.70;0.76;1" dur="10s" repeatCount="indefinite"/>
    <text x="366" y="251" font-family="'SF Mono',monospace" font-size="11.5" fill="#64748b">[ ] Array</text>
    <rect x="450" y="239" width="44" height="16" rx="8" fill="#1e1e30"/>
    <text x="472" y="250" font-family="-apple-system,sans-serif" font-size="9" fill="#4b5280" text-anchor="middle">2 items</text>
  </g>

  <!-- Tags expanded state -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.50;0.54;0.56;0.60;0.70;0.76;1" dur="10s" repeatCount="indefinite"/>
    <text x="366" y="251" font-family="'SF Mono',monospace" font-size="11.5" fill="#64748b">▼ [ ] Array</text>
    <line x1="320" y1="256" x2="320" y2="290" stroke="#2a2a40" stroke-width="1"/>
    <text x="336" y="272" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"admin"</text>
    <text x="336" y="292" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"superuser"</text>
  </g>

  <!-- address -->
  <text x="308" y="279" font-family="-apple-system,sans-serif" font-size="11" fill="#374151">▼</text>
  <text x="324" y="279" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">address</text>
  <text x="394" y="279" font-family="'SF Mono',monospace" font-size="11.5" fill="#64748b">{ } Object</text>
  <line x1="320" y1="284" x2="320" y2="316" stroke="#2a2a40" stroke-width="1"/>
  <text x="336" y="299" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">city</text>
  <text x="372" y="299" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"San Francisco"</text>
  <text x="336" y="318" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">zip</text>
  <text x="368" y="318" font-family="'SF Mono',monospace" font-size="11.5" fill="#4ade80">"94105"</text>
  <text x="308" y="340" font-family="'SF Mono',monospace" font-size="11.5" fill="#818cf8">metadata</text>
  <text x="384" y="340" font-family="'SF Mono',monospace" font-size="11.5" fill="#f87171">null</text>

  <!-- Legend -->
  <rect x="280" y="360" width="506" height="44" rx="8" fill="#09090f"/>
  <rect x="280" y="360" width="506" height="44" rx="8" fill="none" stroke="#1a1a28" stroke-width="1"/>
  <rect x="296" y="370" width="8" height="8" rx="2" fill="#818cf8"/>
  <text x="308" y="378" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280">keys</text>
  <rect x="340" y="370" width="8" height="8" rx="2" fill="#4ade80"/>
  <text x="352" y="378" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280">strings</text>
  <rect x="396" y="370" width="8" height="8" rx="2" fill="#38bdf8"/>
  <text x="408" y="378" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280">numbers</text>
  <rect x="460" y="370" width="8" height="8" rx="2" fill="#fb923c"/>
  <text x="472" y="378" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280">booleans</text>
  <rect x="532" y="370" width="8" height="8" rx="2" fill="#f87171"/>
  <text x="544" y="378" font-family="-apple-system,sans-serif" font-size="10" fill="#4b5280">null</text>
  <text x="296" y="396" font-family="-apple-system,sans-serif" font-size="10" fill="#2d2d48">Click any key to copy its dot-notation path · Live search highlights nodes across the full tree</text>
</svg>
